<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Construction — LiDECX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8e8e8;
      --muted: #555;
      --text: #999;
      --bright: #fff;
      --sun: #FFD166;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e5e5e5;
      --accent: #1a1a1a;
      --muted: #888;
      --text: #444;
      --bright: #000;
      --sun: #f59e0b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    header {
      padding: 24px 0;
      display: flex;
      justify-content: flex-end;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--bright);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      transition: all 0.15s;
    }

    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--muted);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 40px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 32px;
    }

    .hero-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 600;
      color: var(--bright);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .hero-sub {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 40px;
      max-width: 500px;
    }

    .work-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-value { color: var(--sun); font-weight: 600; }

    .track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: var(--sun);
      width: 65%;
      position: relative;
    }

    .fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shine 2s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>
<body data-theme="dark">

  <div class="container">
    <header>
      <button class="theme-toggle" id="themeToggle">LIGHT</button>
    </header>
  </div>

  <main>
    <div class="container">
      <div class="badge">✦ PROJECT STATUS: DEVELOPMENT</div>
      <h1 class="hero-name">Under Construction</h1>
      <p class="hero-sub">Сайт находится в стадии разработки.</p>

      <div class="work-box">
        <div class="label-row">
          <span>Готовность проекта</span>
          <span class="status-value">LOADING...</span>
        </div>
        <div class="track">
          <div class="fill"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span>© <span id="year"></span> LiDECX</span>
        <span>DEPLOYMENT_PENDING</span>
      </div>
    </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme') || 'dark';
    body.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? 'LIGHT' : 'DARK';

    themeToggle.addEventListener('click', () => {
      const isDark = body.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      themeToggle.textContent = isDark ? 'DARK' : 'LIGHT';
      localStorage.setItem('theme', newTheme);
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
